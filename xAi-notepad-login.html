<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xAI Grok - Sign in</title>
    <script src="https://kit.fontawesome.com/8b4b6e9a2f.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #000000);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .xai-window {
            width: 460px;
            background: #111111;
            border: 1px solid #333;
            border-radius: 18px;
            box-shadow: 0 30px 80px rgba(0, 255, 204, 0.15);
            overflow: hidden;
        }

        .title-bar {
            background: #1a1a1a;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .xai-logo { font-size: 26px; color: #00ffcc; }
        .control { width: 13px; height: 13px; border-radius: 50%; }
        .control.min { background: #ffbd2e; }
        .control.max { background: #28ca42; }
        .control.close { background: #ff5f56; }

        .login-content { padding: 50px 40px; text-align: center; }

        .logo { font-size: 62px; margin-bottom: 10px; }

        .premium-badge {
            display: inline-block;
            background: linear-gradient(90deg, #00ffcc, #00ccff);
            color: #000;
            padding: 5px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* ==================== ROLLING SHINE + SPLASH LIGHT ==================== */
        .rolling-shine-container {
            margin: 30px 0;
        }
        .rolling-shine {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 16px 40px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 50px;
            position: relative;
            overflow: hidden;
        }
        .rolling-shine::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 80%;
            height: 200%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), #facc15, #22c55e, transparent);
            animation: splashRoll 2.8s linear infinite;
        }
        @keyframes splashRoll {
            0%   { transform: translateX(-120%); }
            100% { transform: translateX(500%); }
        }

        input {
            width: 100%; padding: 16px; background: #1f1f1f;
            border: 1px solid #444; border-radius: 12px; color: white;
            font-size: 16px; margin-bottom: 18px;
        }
        input:focus { border-color: #00ffcc; }

        .login-btn {
            width: 100%; padding: 17px; 
            background: linear-gradient(90deg, #00ffcc, #00ccff);
            color: #000; font-weight: 700; border: none; 
            border-radius: 12px; font-size: 17px; cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .login-btn::before {
            content: '';
            position: absolute;
            top: -50%; left: -150%;
            width: 60%; height: 200%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: splashRoll 2s linear infinite;
        }
        .login-btn:hover { transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="xai-window">
        <div class="title-bar">
            <div class="flex items-center gap-3">
                <span class="xai-logo">✦</span>
                <span class="font-bold text-xl">xAI Grok</span>
            </div>
            <div class="flex gap-2">
                <div class="control min"></div>
                <div class="control max"></div>
                <div class="control close"></div>
            </div>
        </div>

        <div class="login-content">
            <div class="logo">🚀</div>
            <h1 class="text-3xl font-semibold mb-2">Sign in to xAI</h1>
            <div class="premium-badge">PREMIUM</div>
            <p class="text-gray-400">xAilink.ai + Gemini Earth Mode</p>

            <!-- Rolling Shine with Splash Light -->
            <div class="rolling-shine-container">
                <div class="rolling-shine">
                    <i class="fa-brands fa-google text-2xl" style="color:#4285f4"></i>
                    <i class="fa-brands fa-x-twitter text-2xl" style="color:#fff"></i>
                    <i class="fa-brands fa-apple text-2xl" style="color:#fff"></i>
                </div>
            </div>

            <input type="text" placeholder="Email or phone number" id="email">
            <input type="password" placeholder="Password" id="password">

            <button class="login-btn" onclick="fakeLogin()">Sign in to Grok Premium</button>

            <div class="mt-8 text-sm text-gray-500">
                <a href="#" class="text-[#00ffcc]">Forgot password?</a> • 
                <a href="#" class="text-[#00ffcc]">Create account</a>
            </div>
        </div>
    </div>

    <script src="env-loader.js"></script>
