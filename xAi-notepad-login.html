<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad - Sign in</title>
    <script src="https://kit.fontawesome.com/8b4b6e9a2f.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Notepad Window Style */
        .notepad-window {
            width: 420px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .title-bar {
            background: #2d2d2d;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #444;
        }

        .title-bar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccc;
            font-size: 14px;
        }

        .notepad-icon {
            font-size: 18px;
            color: #00ddff;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #555;
        }

        .control.min { background: #ffbd2e; }
        .control.max { background: #28ca42; }
        .control.close { background: #ff5f56; }

        /* Login Content */
        .login-content {
            padding: 40px 30px;
            text-align: center;
            color: #eee;
        }

        .logo {
            font-size: 42px;
            margin-bottom: 10px;
            color: #00ddff;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Rolling Shine Logos */
        .rolling-shine-container {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .rolling-shine {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 12px 28px;
            background: #111;
            border: 1px solid #333;
            border-radius: 50px;
            position: relative;
            overflow: hidden;
        }

        .rolling-shine::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 60%;
            height: 200%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.25),
                transparent
            );
            animation: rollingShine 4s linear infinite;
        }

        @keyframes rollingShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        .rolling-shine i {
            font-size: 22px;
            transition: all 0.3s;
        }

        .rolling-shine i:hover {
            transform: scale(1.2);
        }

        /* Form */
        input {
            width: 100%;
            padding: 14px 16px;
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
        }

        input:focus {
            border-color: #00ddff;
            box-shadow: 0 0 0 3px rgba(0, 221, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #00ddff;
            color: #111;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #00ffff;
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 13px;
            color: #777;
        }

        .footer-links a {
            color: #00ddff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="notepad-window">
        <!-- Title Bar -->
        <div class="title-bar">
            <div class="title-bar-left">
                <span class="notepad-icon">📝</span>
                <span>Notepad</span>
            </div>
            <div class="window-controls">
                <div class="control min"></div>
                <div class="control max"></div>
                <div class="control close"></div>
            </div>
        </div>

        <!-- Login Area -->
        <div class="login-content">
            <div class="logo">📝</div>
            <h1>Sign in to Notepad</h1>
            <p>Continue with your account</p>

            <!-- Rolling Shine Logos -->
            <div class="rolling-shine-container">
                <div class="rolling-shine">
                    <i class="fa-brands fa-google" style="color:#4285f4" title="Google"></i>
                    <i class="fa-brands fa-microsoft" style="color:#00a4ef" title="Microsoft"></i>
                    <i class="fa-brands fa-facebook-f" style="color:#1877f2" title="Facebook"></i>
                    <i class="fa-brands fa-x-twitter" style="color:#fff" title="X"></i>
                    <i class="fa-brands fa-apple" style="color:#fff" title="Apple"></i>
                </div>
            </div>

            <input type="text" placeholder="Email or phone number" id="email">
            <input type="password" placeholder="Password" id="password">

            <button class="login-btn" onclick="fakeLogin()">Sign in</button>

            <div class="footer-links">
                <a href="#">Forgot password?</a> • 
                <a href="#">Create new account</a>
            </div>
        </div>
    </div>

    <script>
        function fakeLogin() {
            const email = document.getElementById('email').value;
            if (email) {
                alert("✅ Login successful!\n\n(এটা শুধু ডেমো। আসল লগিন হয়নি। শুধু UI দেখার জন্য।)");
            } else {
                alert("Please enter email/phone");
            }
        }

        // Real-time Bash-like feel (optional console log)
        console.log("%cNotepad Login UI Generated Successfully ✓", "color:#00ddff; font-size:14px;");
    </script>

</body>
</html>
