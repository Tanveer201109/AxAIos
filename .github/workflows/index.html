<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTx - অফলাইন</title>
  <style>
    body {background:#000; color:#0f0; font-family:monospace; padding:20px; text-align:center; margin:0;}
    h1 {color:#0ff; margin-bottom:20px;}
    button {background:#0f0; color:#000; padding:12px 24px; font-size:18px; border:none; border-radius:8px; cursor:pointer;}
  </style>
</head>
<body>
  <h1>CTx লোকাল ড্যাশবোর্ড</h1>
  <p>স্ট্যাটাস: রানিং (অফলাইন)</p>
  <p>সময়: <span id="time"></span></p>
  <button onclick="alert('ভয়েস কমান্ড সিমুলেটেড!')">ভয়েস টেস্ট</button>

  <script>
    function updateTime() {
      document.getElementById('time').innerText = new Date().toLocaleString('bn-BD');
    }
    updateTime();
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
